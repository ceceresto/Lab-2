name: Deploy React App to GitHub Pages
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pages: write
  id-token: write
jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: personal-cv-react-fresh
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: personal-cv-react-fresh/package-lock.json
      - run: npm ci
      - run: chmod +x node_modules/.bin/vite
      - run: npm run build
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: personal-cv-react-fresh/dist
      - uses: actions/deploy-pages@v4
